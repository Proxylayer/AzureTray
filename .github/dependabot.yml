version: 2
updates:
  - package-ecosystem: nuget
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
    open-pull-requests-limit: 5
    groups:
      microsoft-extensions:
        patterns:
          - "Microsoft.Extensions.*"
      serilog:
        patterns:
          - "Serilog*"
      test-tooling:
        patterns:
          - "Microsoft.NET.Test.Sdk"
          - "xunit*"
          - "NSubstitute"
    labels:
      - dependencies

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
