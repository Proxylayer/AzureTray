name: Bug report
description: Something is broken or behaves incorrectly
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. **Do not include passwords, tokens, tenant IDs, or other sensitive data.** Replace them with placeholders.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One or two sentences describing the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Numbered steps to reproduce.
      placeholder: |
        1. Launch the app
        2. Right-click tray icon, click Settings
        3. ...
        4. Observe X
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: App version
      description: Settings > Version, or commit SHA if running from source.
      placeholder: 0.1.0
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Windows version
      placeholder: Windows 11 23H2
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log excerpt
      description: |
        Logs live at `%LOCALAPPDATA%\AzureTray.Data\logs\`. Paste only the relevant lines.
      render: text

  - type: textarea
    id: extras
    attributes:
      label: Anything else?
