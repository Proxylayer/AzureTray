name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: Version to release, without the leading 'v' (e.g. 1.2.3)
        required: true

permissions:
  contents: write       # for creating the GitHub Release
  id-token: write       # for attest-build-provenance
  attestations: write   # for attest-build-provenance

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so SourceLink can embed commit metadata

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          $v = if ($env:GITHUB_REF -like 'refs/tags/v*') {
            $env:GITHUB_REF -replace 'refs/tags/v', ''
          } else {
            '${{ github.event.inputs.version }}'
          }
          if (-not $v) { Write-Error 'Could not resolve version'; exit 1 }
          "version=$v" >> $env:GITHUB_OUTPUT
          "Resolved version: $v" | Write-Host

      - name: Restore
        run: dotnet restore AzureTray.sln

      - name: Build
        run: >
          dotnet build AzureTray.sln
          --configuration Release
          --no-restore
          /p:Version=${{ steps.ver.outputs.version }}

      - name: Test
        run: >
          dotnet test AzureTray.sln
          --configuration Release
          --no-build
          --logger "trx;LogFileName=test-results.trx"
          --results-directory TestResults

      # Plugin packages (Contracts, PIM, LAPS) are published independently
      # via the workflow_dispatch trigger on publish-plugins.yml — they
      # track their own version in each csproj and only ship when the
      # author explicitly publishes a new version, so host releases don't
      # churn nuget.org with no-op republishes.

      # --- Velopack pack of the self-contained tray app ------------------
      - name: Publish self-contained win-x64
        run: >
          dotnet publish src/AzureTray/AzureTray.csproj
          --configuration Release
          --runtime win-x64
          --self-contained
          --output publish
          /p:Version=${{ steps.ver.outputs.version }}

      - name: Install Velopack CLI
        run: dotnet tool install --global vpk

      - name: Pack with Velopack
        shell: pwsh
        run: |
          vpk pack `
            --packId AzureTray `
            --packVersion ${{ steps.ver.outputs.version }} `
            --packAuthors "ProxyLayer" `
            --packTitle "AzureTray" `
            --packDir publish `
            --mainExe AzureTray.exe `
            --outputDir Releases

      # vpk emits the installer as AzureTraySetup.exe (or AzureTray-win-Setup.exe
      # on newer vpk). Rename it to include the version so the GitHub Release
      # asset is unambiguous when users download an older one. The internal
      # AzureTray.exe inside the .nupkg is NOT touched — the Velopack manifest
      # references that exact filename.
      - name: Stamp version into Setup EXE filename
        shell: pwsh
        run: |
          $setup = Get-ChildItem Releases -Filter '*Setup*.exe' | Select-Object -First 1
          if (-not $setup) { Write-Error 'Setup exe not found in Releases/'; exit 1 }
          $newName = "AzureTraySetup-${{ steps.ver.outputs.version }}.exe"
          Rename-Item -LiteralPath $setup.FullName -NewName $newName
          Write-Host "Renamed $($setup.Name) -> $newName"

      - name: Install CycloneDX
        run: dotnet tool install --global CycloneDX

      - name: Generate SBOM
        run: >
          dotnet CycloneDX AzureTray.sln
          --output Releases
          --filename sbom.json
          --json

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            Releases/*.exe
            Releases/*.nupkg

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: TestResults/**/*.trx
          if-no-files-found: ignore

      - name: Create draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: v${{ steps.ver.outputs.version }}
          draft: true
          generate_release_notes: true
          files: |
            Releases/*.exe
            Releases/*.nupkg
            Releases/RELEASES
            Releases/sbom.json
